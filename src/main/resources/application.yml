server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  application:
    name: crm-backend
  # The application's OWN runtime datasource (used by Hibernate/JPA for every request)
  # deliberately connects as the restricted, non-superuser "salesmanager_app" role created
  # by V1__init_schema.sql - NOT the privileged bootstrap role below. Postgres superusers
  # always bypass Row-Level Security unconditionally (even with FORCE), so RLS would be a
  # no-op if the app queried as the bootstrap role.
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/salesmanager}
    username: ${SPRING_DATASOURCE_USERNAME:salesmanager_app}
    # Must always equal the DB_APP_PASSWORD used below in flyway.placeholders - that's what
    # V1__init_schema.sql actually creates the salesmanager_app role's password from. Sourced
    # from ONE env var (DB_APP_PASSWORD) here so the two can never drift apart.
    password: ${DB_APP_PASSWORD:salesmanager_app}
  jpa:
    hibernate:
      # Flyway owns the schema; Hibernate must never auto-generate DDL.
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
    # Deliberate Phase 0 simplification: open-in-view keeps the same Hibernate
    # Session (and therefore the enabled tenant Hibernate filter) alive for the
    # entire request/response cycle, including lazy loading in views/serialization.
    # Revisit in a later phase if we move to explicit service-layer DTO projection.
    open-in-view: true
  servlet:
    # Spring Boot's defaults (1MB max file size, 10MB max request size) are too small for a
    # realistic multi-hundred-row historical-client .xlsx export via the Lead import endpoint
    # (leadimport.LeadImportController) - bump both to 10MB.
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  flyway:
    enabled: true
    locations: classpath:db/migration
    # Migrations run as the privileged bootstrap role (matches the docker run credentials
    # in the README/setup notes) since they need to CREATE TABLE/ROLE - a separate,
    # deliberately-elevated datasource from spring.datasource.* above.
    url: ${SPRING_FLYWAY_URL:jdbc:postgresql://localhost:5432/salesmanager}
    user: ${SPRING_FLYWAY_USER:salesmanager}
    password: ${SPRING_FLYWAY_PASSWORD:salesmanager}
    placeholders:
      # Substituted into V1__init_schema.sql's CREATE ROLE statement - see the comment there.
      app_db_password: ${DB_APP_PASSWORD:salesmanager_app}

jwt:
  # Dev-only fallback secret - MUST be overridden via JWT_SECRET env var in any real environment.
  secret: ${JWT_SECRET:dev-only-secret-change-me-please-32-bytes-min-0123456789}
  access-expiry-ms: ${JWT_ACCESS_EXPIRY_MS:900000}
  refresh-expiry-ms: ${JWT_REFRESH_EXPIRY_MS:2592000000}

platform:
  admin:
    # Shared secret checked against the X-Platform-Key header by InternalEntitlementController -
    # dev-only fallback, MUST be overridden via PLATFORM_ADMIN_KEY env var in any real
    # environment. Same pattern as jwt.secret above.
    key: ${PLATFORM_ADMIN_KEY:dev-only-platform-key-change-me}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
